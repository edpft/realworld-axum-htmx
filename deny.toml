[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-DFS-2016",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
]
unused-allowed-license = "allow"
# Workspace crates do not declare a licence yet
exceptions = [
    { allow = ["LicenseRef-scancode-unknown-license-reference"], name = "domain" },
    { allow = ["LicenseRef-scancode-unknown-license-reference"], name = "application" },
    { allow = ["LicenseRef-scancode-unknown-license-reference"], name = "infrastructure" },
    { allow = ["LicenseRef-scancode-unknown-license-reference"], name = "web" },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[advisories]
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
